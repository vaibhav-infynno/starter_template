name: starter_app
description: Main application target.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  auto_route: ^11.1.0
  freezed_annotation: ^3.1.0
  flutter_gen: ^5.12.0
  envied: ^1.3.0
  json_annotation: ^4.9.0
  image_picker: ^1.2.0
  auto_size_text: ^3.0.0
  another_flushbar: ^2.2.4
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1
  lottie: ^3.3.2
  get_it: ^9.2.1
  injectable: ^3.0.0
  fpdart: ^1.1.1
  connectivity_plus: ^7.0.0
  flutter_svg: ^2.2.1

  # Monorepo local package dependencies
  core:
    path: ../../packages/core
  widgets:
    path: ../../packages/widgets

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.15
  auto_route_generator: ^10.1.0
  freezed: ^3.2.3
  envied_generator: ^1.3.0
  json_serializable: ^6.11.1
  flutter_gen_runner: ^5.12.0
  injectable_generator: ^3.0.2

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/app_logo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
    - assets/lottie/
