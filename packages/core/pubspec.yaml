name: core
description: Reusable core logic, networking, database utils, translation delegate.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  hive_flutter: ^1.1.0
  fpdart: ^1.1.1
  connectivity_plus: ^7.0.0
  logger: ^2.6.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_gen: ^5.12.0
  lottie: ^3.3.2
  envied: ^1.3.0
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1
  auto_route: ^11.1.0
  auto_size_text: ^3.0.0
  another_flushbar: ^2.2.4
  flutter_svg: ^2.2.1

dev_dependencies:
  build_runner: ^2.4.15
  injectable_generator: ^3.0.2
  flutter_gen_runner: ^5.12.0
  envied_generator: ^1.3.0

flutter:
  generate: true
  assets:
    - assets/lottie/
